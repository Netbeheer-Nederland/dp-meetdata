name: MeetdataDataproduct
description: |-
  Information model for the 'meetdata' data product.

  ```mermaid
  classDiagram
  direction LR

  class MeterReading {
      DateTimeInterval values_interval
      IntervalBlock interval_blocks
      string description
      string m_rid
      Name names
  }
  class Meter {
      MeterReading meter_readings
      string install_code
      Customer customer
      string description
      string m_rid
      Name names
  }
  class Customer {
      CustomerKind kind
      string description
      string m_rid
      Name names
  }
  class IntervalBlock {
      IntervalReading interval_readings
      ReadingType reading_type
  }
  class IntervalReading {
      DateTimeInterval time_period
      string value
      ReadingQuality reading_qualities
      date time_stamp
      string description
      string m_rid
      Name names
  }
  class ReadingQuality {
      string comment
      BaseReading reading
  }
  class MarketEvaluationPoint {
      string european_article_number_ean
      EndDevice end_devices
      string description
      string m_rid
      Name names
  }
  class ReadingType {
      AccumulationKind accumulation
      AggregateKind aggregate
      RationalNumber argument
      CommodityKind commodity
      integer consumption_tier
      integer cpp
      Currency currency
      FlowDirectionKind flow_direction
      ReadingInterharmonic interharmonic
      MacroPeriodKind macro_period
      MeasurementKind measurement_kind
      MeasuringPeriodKind measuring_period
      UnitMultiplier multiplier
      PhaseCode phases
      integer tou
      UnitSymbol unit
      string description
      string m_rid
      Name names
  }
  class MeterReadingDataSet {
      string identifier
      string contact_point
      string conforms_to
      date release_date
      string version
      MarketEvaluationPoint market_evaluation_points
  }

  MeterReading --> IntervalBlock : interval_blocks
  Meter --> MeterReading : meter_readings
  Meter --> Customer : customer
  IntervalBlock --> IntervalReading : interval_readings
  IntervalBlock --> ReadingType : reading_type
  IntervalReading --> ReadingQuality : reading_qualities
  MarketEvaluationPoint --> Meter : end_devices
  MeterReadingDataSet --> MarketEvaluationPoint : market_evaluation_points
  ```

  ## Additional schemas
  * [JSON Schema](https://raw.githubusercontent.com/Netbeheer-Nederland/dp-meetdata/refs/heads/main/project/jsonschema/dp_meetdata.schema.json)
